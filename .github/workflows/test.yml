name: Build and Test JOB
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential cmake git pkg-config \
          libssl-dev libzstd-dev libsodium-dev zlib1g-dev \
          libflatbuffers-dev flatbuffers-compiler \
          nlohmann-json3-dev libyaml-cpp-dev libmsgpack-cxx-dev \
          libudev-dev
        sudo apt-get install -y catch2 || sudo apt-get install -y libcatch2-dev

    - name: Configure CMake
      run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DJOB_CI_BUILD=ON

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}} -j$(nproc)

    - name: Test Core
      working-directory: ${{github.workspace}}/build/tests/job_core
      run: ./test_job_core

    - name: Test Threads
      working-directory: ${{github.workspace}}/build/tests/job_threads
      run: ./test_job_threads

    - name: Test Crypto
      working-directory: ${{github.workspace}}/build/tests/job_crypto
      run: ./test_job_crypto

    - name: Test IO
      working-directory: ${{github.workspace}}/build/tests/job_io
      run: ./test_job_io

    - name: Test Net
      working-directory: ${{github.workspace}}/build/tests/job_net
      run: ./test_job_net

    - name: Test Serializer Core
      working-directory: ${{github.workspace}}/build/tests/job_serializer
      run: ./test_job_serializer

    # - name: Test Serializer MsgPack Plugin
    #   working-directory: ${{github.workspace}}/build/tests/job_serializer_msgpack
    #   run: ./test_job_serializer_msgpack

    - name: Test UART
      working-directory: ${{github.workspace}}/build/tests/job_uart
      run: ./test_job_uart

    - name: Test Science
      working-directory: ${{github.workspace}}/build/tests/job_science
      run: ./test_job_science

    - name: Test AI
      working-directory: ${{github.workspace}}/build/tests/job_ai
      run: ./test_job_ai

    - name: Test Ansi
      working-directory: ${{github.workspace}}/build/tests/job_ansi
      run: ./test_job_ansi

