name: Build and Test JOB
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential cmake git pkg-config \
          libssl-dev libzstd-dev libsodium-dev zlib1g-dev \
          libflatbuffers-dev flatbuffers-compiler \
          nlohmann-json3-dev libyaml-cpp-dev libmsgpack-cxx-dev \
          libudev-dev
        sudo apt-get install -y catch2 || sudo apt-get install -y libcatch2-dev

    - name: Configure CMake
      run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}} -j$(nproc)

    - name: Run All Tests
      working-directory: ${{github.workspace}}/build
      run: ctest -C ${{env.BUILD_TYPE}} --output-on-failure -j2

